{{define "vochdonado.html"}}
<section class="vochdonado" aria-label="Voĉdonado">
  <form hx-post="/vochdonado/{{.ContentID}}"
        hx-target="closest .vochdonado"
        hx-swap="outerHTML">
    <div class="vote-buttons">
      <button type="submit" name="value" value="1"
              class="vote-btn {{if .CurrentVote}}{{if eq .CurrentVote.Value 1}}active{{end}}{{end}}"
              title="{{if .CurrentVote}}{{if eq .CurrentVote.Value 1}}{{t .UILang "vote.aria_cancel"}}{{else}}{{t .UILang "vote.aria_up"}}{{end}}{{else}}{{t .UILang "vote.aria_up"}}{{end}}"
              aria-label="{{t .UILang "vote.aria_up"}}"
              {{if not .User}}disabled{{end}}>
        &#9650; {{t .UILang "vote.useful"}}
      </button>
      <span class="vote-score" aria-label="{{.VoteScore}} {{t .UILang "vote.count_aria"}}">{{.VoteScore}}</span>
      <button type="submit" name="value" value="-1"
              class="vote-btn {{if .CurrentVote}}{{if eq .CurrentVote.Value -1}}active{{end}}{{end}}"
              title="{{if .CurrentVote}}{{if eq .CurrentVote.Value -1}}{{t .UILang "vote.aria_cancel"}}{{else}}{{t .UILang "vote.aria_down"}}{{end}}{{else}}{{t .UILang "vote.aria_down"}}{{end}}"
              aria-label="{{t .UILang "vote.aria_down"}}"
              {{if not .User}}disabled{{end}}>
        &#9660; {{t .UILang "vote.useless"}}
      </button>
    </div>
    {{if not .User}}<small><a href="/enskribi">{{t .UILang "vote.login_link"}}</a> {{t .UILang "vote.login_prompt"}}</small>{{end}}
  </form>
  {{if .User}}
  <details id="flag-{{.ContentID}}" class="flag-section">
    <summary class="flag-btn outline secondary" title="{{t .UILang "flag.title"}}">&#9873; {{t .UILang "flag.button"}}</summary>
    <form hx-post="/ekzerco/{{.ContentID}}/flagi"
          hx-target="#flag-{{.ContentID}}"
          hx-swap="outerHTML"
          style="margin-top:0.5rem">
      <textarea name="comment" rows="2" maxlength="500"
                placeholder="Priskribu la problemon (nedeviga)..."
                style="font-size:0.85em"></textarea>
      <button type="submit" class="flag-btn outline secondary">
        &#9873; {{t .UILang "flag.button"}}
      </button>
    </form>
  </details>
  {{end}}
</section>
{{end}}
