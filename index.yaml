indexes:
  # Content: approved items by rating (for recommendations)
  - kind: ContentItem
    properties:
      - name: status
      - name: rating

  # Content: approved items by type (for dictionary/vortaro)
  - kind: ContentItem
    properties:
      - name: status
      - name: type

  # Attempts: by user, newest first
  - kind: Attempt
    properties:
      - name: user_id
      - name: timestamp
        direction: desc

  # Attempts: by content item, newest first
  - kind: Attempt
    properties:
      - name: content_item_id
      - name: timestamp
        direction: desc

  # Comments: pending moderation queue (approved=false, oldest first)
  - kind: Comment
    properties:
      - name: approved
      - name: created_at

  # Comments: approved, by content, oldest first
  - kind: Comment
    properties:
      - name: content_item_id
      - name: approved
      - name: created_at
