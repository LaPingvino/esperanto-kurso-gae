indexes:
  # Content: approved items in a series, ordered
  - kind: ContentItem
    properties:
      - name: status
      - name: series_slug
      - name: series_order

  # Content: all items in a series (admin), ordered
  - kind: ContentItem
    properties:
      - name: series_slug
      - name: series_order

  # Content: approved items by rating (for recommendations)
  - kind: ContentItem
    properties:
      - name: status
      - name: rating

  # Content: approved items by type (for dictionary/vortaro)
  - kind: ContentItem
    properties:
      - name: status
      - name: type

  # Content: approved items by series_parent (for child series buttons)
  - kind: ContentItem
    properties:
      - name: status
      - name: series_parent

  # Content: approved items by tag (for tag-filtered vortaro)
  - kind: ContentItem
    properties:
      - name: status
      - name: tags

  # Attempts: by user, newest first
  - kind: Attempt
    properties:
      - name: user_id
      - name: timestamp
        direction: desc

  # Attempts: by content item, newest first
  - kind: Attempt
    properties:
      - name: content_item_id
      - name: timestamp
        direction: desc

  # Translations: by content item, best voted first
  - kind: Translation
    properties:
      - name: target_id
      - name: vote_score
        direction: desc

  # TranslationVote: by user (for lookup)
  - kind: TranslationVote
    properties:
      - name: user_id
      - name: translation_id

  # Comments: pending moderation queue (approved=false, oldest first)
  - kind: Comment
    properties:
      - name: approved
      - name: created_at

  # Comments: approved, by content, oldest first
  - kind: Comment
    properties:
      - name: content_item_id
      - name: approved
      - name: created_at

  # ModMessage: unread messages, oldest first
  - kind: ModMessage
    properties:
      - name: read
      - name: created_at

